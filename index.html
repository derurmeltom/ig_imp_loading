<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Imperial Roleplay | Loading</title>

    <!-- Sci-Fi / Terminal Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <!-- Scanlines -->
    <div class="scanlines"></div>

    <!-- STAFF LIST -->
    <div class="staff">
        <h2>TEAMMITGLIEDER</h2>

        <div class="staff-section">
            <span class="rank">Serververwaltung</span>
            <span>Brike</span>
        </div>

        <div class="staff-section">
            <span class="rank">Serververwaltung</span>
            <span>Cliffer</span>
        </div>

        <div class="staff-section">
            <span class="rank">Serververwaltung</span>
            <span>derurmeltom</span>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <img src="imperial.png" class="logo">

        <h1 class="title">IMPERIAL ROLEPLAY</h1>
        <p class="subtitle">Infinity Gaming</p>

        <div class="loading-bar">
            <div id="progress"></div>
        </div>

        <p class="status" id="status">Zugriff auf imperiale Systeme…</p>

        <div class="footer">
            discord.gg/infnitygaming<br>
            Zugriff wird überwacht.
        </div>

    </div>

</div>

<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
